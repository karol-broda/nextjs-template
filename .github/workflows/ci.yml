concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  build:
    env:
      SKIP_ENV_VALIDATION: 'true'
    name: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/determinate-nix-action@v3
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: |-
        eval "$(nix print-dev-env)"
        bun install --frozen-lockfile
        bun run build
  check:
    name: lint & typecheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/determinate-nix-action@v3
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: |-
        eval "$(nix print-dev-env)"
        bun install --frozen-lockfile
        bun run check
        bun run format:check
  e2e:
    env:
      BETTER_AUTH_SECRET: op://CICD/nextjs-template/BETTER_AUTH_SECRET
      DATABASE_URL: op://CICD/nextjs-template/DATABASE_URL
      NEXT_PUBLIC_URL: op://CICD/nextjs-template/NEXT_PUBLIC_URL
    name: e2e tests
    runs-on: ubuntu-latest
    services:
      postgres:
        env:
          POSTGRES_DB: nextjs-template
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        image: pgvector/pgvector:pg18
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
        ports:
        - 5432:5432
    steps:
    - uses: actions/checkout@v4
    - env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      name: load secrets
      uses: 1Password/load-secrets-action@v2
      with:
        export-env: true
    - uses: DeterminateSystems/determinate-nix-action@v3
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - name: install & prepare database
      run: |-
        eval "$(nix print-dev-env)"
        bun install --frozen-lockfile
        bun run db:push
    - name: run e2e tests
      run: |-
        eval "$(nix print-dev-env)"
        bun run e2e
    - if: ${{ !cancelled() }}
      name: upload playwright report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/determinate-nix-action@v3
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: |-
        eval "$(nix print-dev-env)"
        bun install --frozen-lockfile
        bun test
name: ci
'on':
  pull_request:
    branches:
    - master
  push:
    branches:
    - master
